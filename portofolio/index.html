const ALL_PHOTOS = [

  { src: "../assets/images/foto4.jpg", alt: "Karya YR Studio" },
  { src: "../assets/images/drone.jpg", alt: "Aerial Ngawi" },
];

function PortofolioPage() {
  useReveal();

      <Nav active="home" depth={1} />

      <section className="page-hero">
        <div className="container">
          <div className="index">Arsip Visual</div>
          <span className="eyebrow" style={{display:"block", marginBottom: 16}}>Foto · Video · Aerial</span>

        <div className="container reveal">

                  src={`https://www.youtube.com/embed/${v.id}`}
                  title={v.title}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen
                  loading="lazy"
                  style={{position:"absolute", inset:0, width:"100%", height:"100%", border:0}}
