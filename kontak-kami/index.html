<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak — YR Studio</title>
<meta name="description" content="Hubungi YR Studio Ngawi via WhatsApp, email, atau Instagram. Konsultasi gratis tanpa komitmen.">
<link rel="canonical" href="https://www.yrstudio.id/kontak-kami/">
<meta property="og:type" content="article">
<meta property="og:title" content="Kontak — YR Studio">
<meta property="og:description" content="Hubungi YR Studio Ngawi via WhatsApp, email, atau Instagram. Konsultasi gratis tanpa komitmen.">
<meta property="og:url" content="https://www.yrstudio.id/kontak-kami/">
<meta property="og:image" content="https://www.yrstudio.id/assets/images/manager.jpg">
<meta property="og:site_name" content="YR Studio">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="../favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="../assets/css/site.css">
<link rel="stylesheet" href="../assets/css/site-extra.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="../assets/js/components.jsx"></script>
<script type="text/babel" src="../assets/js/tweaks-panel.jsx"></script>
<script type="text/babel" src="../assets/js/yr-tweaks.jsx"></script>
<script type="text/babel">
const { useState: uS } = React;

function KontakPage() {
  useReveal();
  const [form, setForm] = uS({ name: "", phone: "", date: "", service: "Jasa Fotografer", message: "" });
  const [sent, setSent] = uS(false);

  const update = (k) => (e) => setForm({...form, [k]: e.target.value});
  const send = (e) => {
    e.preventDefault();
    const text = `Halo YR Studio!\n\nNama: ${form.name}\nWhatsApp: ${form.phone}\nTanggal acara: ${form.date}\nLayanan: ${form.service}\n\nPesan:\n${form.message}`;
    window.open(`https://wa.me/${WA}?text=${encodeURIComponent(text)}`, "_blank");
    setSent(true);
  };

  return (
    <>
      <Nav active="kontak" depth={1} />

      <section className="page-hero">
        <div className="container">
          <span className="eyebrow" style={{display:"block", marginBottom: 16}}>Kami senang mendengar cerita kamu.</span>
          <h1>Mari mulai <em>obrolan.</em></h1>
          <p className="lead">Konsultasi gratis tanpa komitmen. Ceritakan acara, tanggal, dan referensi visual yang kamu suka — kami akan susun penawaran khusus dalam 1–2 hari kerja.</p>
        </div>
      </section>

      <section className="section">
        <div className="container">
          <div className="reveal" style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap: 80, alignItems:"start"}}>
            <div>
              <span className="eyebrow">Form cepat</span>
              <h3 style={{marginTop: 16, marginBottom: 40}}>Isi sebentar — terkirim langsung ke WhatsApp kami.</h3>
              <form className="contact-form" onSubmit={send}>
                <div>
                  <label>Nama</label>
                  <input required value={form.name} onChange={update("name")} placeholder="Nama panggilan" />
                </div>
                <div>
                  <label>Nomor WhatsApp</label>
                  <input required value={form.phone} onChange={update("phone")} placeholder="08xxxxxxxxxx" />
                </div>
                <div>
                  <label>Tanggal acara</label>
                  <input value={form.date} onChange={update("date")} placeholder="DD/MM/YYYY atau perkiraan" />
                </div>
                <div>
                  <label>Layanan</label>
                  <select value={form.service} onChange={update("service")}>
                    <option>Jasa Fotografer</option>
                    <option>Jasa Videografer</option>
                    <option>Foto + Video Bundling</option>
                    <option>Sewa Drone</option>
                    <option>Konsultasi umum</option>
                  </select>
                </div>
                <div className="full">
                  <label>Cerita singkat</label>
                  <textarea required value={form.message} onChange={update("message")} placeholder="Ceritakan acara, lokasi, dan referensi visual yang kamu suka." />
                </div>
                <div className="full">
                  <button type="submit" className="btn btn-primary">Kirim via WhatsApp →</button>
                  {sent && <span style={{marginLeft: 16, color:"var(--accent-ink)", fontSize: 13}}>✓ Terkirim — silakan kirim di WhatsApp</span>}
                </div>
              </form>
            </div>

            <div style={{display:"flex", flexDirection:"column", gap: 28}}>
              <div>
                <span className="eyebrow">Atau langsung</span>
                <h3 style={{marginTop: 16}}>Pilih saluran <em>favorit</em> kamu.</h3>
              </div>
              <a href={WA_LINK} target="_blank" rel="noopener" className="contact-direct">
                <div>
                  <span className="eyebrow">WhatsApp</span>
                  <div className="value">{PHONE}</div>
                </div>
                <span className="arr">→</span>
              </a>
              <a href={`mailto:${EMAIL}`} className="contact-direct">
                <div>
                  <span className="eyebrow">Email</span>
                  <div className="value">{EMAIL}</div>
                </div>
                <span className="arr">→</span>
              </a>
              <a href={`https://instagram.com/${IG}`} target="_blank" rel="noopener" className="contact-direct">
                <div>
                  <span className="eyebrow">Instagram</span>
                  <div className="value">@{IG}</div>
                </div>
                <span className="arr">→</span>
              </a>
              <a href={`tel:+${WA}`} className="contact-direct">
                <div>
                  <span className="eyebrow">Telepon</span>
                  <div className="value">{PHONE}</div>
                </div>
                <span className="arr">→</span>
              </a>
              <div style={{marginTop: 24, padding: "24px 0", borderTop:"1px solid var(--rule)"}}>
                <span className="eyebrow">Jam operasional</span>
                <div style={{marginTop: 12, fontFamily:"var(--serif)", fontSize: 20}}>Senin – Sabtu · 09:00 – 21:00 WIB</div>
                <p style={{color:"var(--muted)", fontSize: 14, marginTop: 8}}>Untuk hari Minggu kami sering shooting — pesan WhatsApp tetap akan dibalas hari kerja berikutnya.</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <ContactBlock />
      <Footer depth={1} />
      <YrTweaksPanel />

      <style>{`
        .contact-direct {
          display: flex; justify-content: space-between; align-items: end;
          padding: 24px 0; border-top: 1px solid var(--rule);
          transition: padding-left 0.3s;
        }
        .contact-direct:last-of-type { border-bottom: 1px solid var(--rule); }
        .contact-direct:hover { padding-left: 12px; }
        .contact-direct .value { font-family: var(--serif); font-size: clamp(22px, 2.4vw, 30px); margin-top: 6px; }
        .contact-direct .arr { font-size: 22px; color: var(--muted); }
        .contact-direct:hover .arr { color: var(--ink); }
      `}</style>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<KontakPage />);
</script>
</body>
</html>
